name: Update X chapter embeds

on:
  schedule:
    - cron: "12 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate X chapter embeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USERNAME: peterxing
          X_MAX_RESULTS: 50
        run: node scripts/update-x-chapter-embeds.mjs
      - name: Commit updated embeds
        run: |
          if git diff --quiet public/data/x-chapter-embeds.json; then
            echo "No X chapter embed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/x-chapter-embeds.json
          git commit -m "Update X chapter embeds"
          git push
